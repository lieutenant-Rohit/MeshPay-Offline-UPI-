      - PAYMENT_RATELIMIT_PER_VPA=100000
      - PAYMENT_RATELIMIT_PER_VPA_WINDOW_SECONDS=60
      - PAYMENT_RATELIMIT_GLOBAL=500000
      - PAYMENT_RATELIMIT_GLOBAL_WINDOW_SECONDS=60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mesh-net

  node-1-alice:
    build: ./phone-node
    ports:
      - "5001:5001"
    environment:
      - NODE_ID=Node-1
      - VISUALIZER_URL=http://visualizer:5002
    volumes:
      - ./mesh-topology.json:/app/mesh-topology.json:ro
    networks:
      - mesh-net

