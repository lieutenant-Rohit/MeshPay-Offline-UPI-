services:
  visualizer:
    build: ./visualizer
    ports:
      - "5002:5002"
    networks:
      - mesh-net

  spring-bank:
    build: .
    ports:
      - "8080:8080"
    environment:
      - VISUALIZER_URL=http://visualizer:5002
    networks:
      - mesh-net
    depends_on:
      visualizer:
        condition: service_started

  node-1-alice:
    build: ./phone-node
    ports:
      - "5001:5001"
    environment:
      - NODE_ID=Node-1
      - VISUALIZER_URL=http://visualizer:5002
    volumes:
      - ./mesh-topology.json:/app/mesh-topology.json:ro
    networks:
      - mesh-net

  node-2:
    build: ./phone-node
    environment:
      - NODE_ID=Node-2
      - VISUALIZER_URL=http://visualizer:5002
