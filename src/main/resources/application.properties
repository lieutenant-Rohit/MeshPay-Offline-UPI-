# ============================================================
# APPLICATION
# ============================================================
spring.application.name=payment
server.port=8080

# ============================================================
# DATABASE — H2 File-Based (survives restarts)
# Removed AUTO_SERVER=TRUE — incompatible with DB_CLOSE_ON_EXIT=FALSE in H2 2.2.x
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/paymentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / HIBERNATE
# update → keeps existing data across restarts
# Removed spring.jpa.database-platform — H2Dialect auto-detected (removes deprecation warning)
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 CONSOLE
# Browse: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/paymentdb
# User: sa  |  Password: (blank)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# LOGGING
# ============================================================
logging.level.com.offline.payment=DEBUG
logging.level.org.springframework.web=INFO

logging.level.root=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG
server.error.include-stacktrace=always