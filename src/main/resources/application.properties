spring.application.name=payment
server.port=8080

# ============================================================
# DATABASE — PostgreSQL (Production-grade for 1M users)
# ============================================================
spring.datasource.url=jdbc:postgresql://postgres:5432/paymentdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=payment_user
spring.datasource.password=payment_pass

# ============================================================
# HIKARICP CONNECTION POOL
# ============================================================
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=PaymentHikariCP

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Batch insert optimization (critical for 1M users)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Use pooled sequence generator instead of IDENTITY for batch inserts
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Query plan cache for repeated query optimization
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128

# ============================================================
# REDIS — Caching (User Cache, Replay Hash Cache, Rate Limiting)
# ============================================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=4

# ============================================================
# ACTUATOR — Metrics & Health
# ============================================================
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ============================================================
# LOGGING
# ============================================================
logging.level.com.offline.payment=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN

# ============================================================
# RATE LIMITING
# ============================================================
payment.rate-limit.per-vpa=10
payment.rate-limit.per-vpa-window-seconds=60
payment.rate-limit.global=1000
payment.rate-limit.global-window-seconds=60
